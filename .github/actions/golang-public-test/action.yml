name: 'Go Public Service — Full Test Pipeline'
description: 'Run unit tests, linting, Docker build (Buildx), security scan, E2E tests, and benchmarks for public Go services (ubuntu-latest)'
inputs:
  go_version:
    description: 'Go version to use'
    required: false
    default: '1.26.x'
  test_path:
    description: 'Go test path for unit tests'
    required: false
    default: './internal/...'
  github_token:
    description: 'GitHub token for PR comments and reviewdog'
    required: true
  golangci_lint_timeout:
    description: 'golangci-lint timeout'
    required: false
    default: '5m'
  docker_image_name:
    description: 'Docker image name (e.g. my-service)'
    required: true
  e2e_test_path:
    description: 'Path for E2E tests'
    required: false
    default: './tests/e2e/...'
  benchmark_path:
    description: 'Path for benchmark tests'
    required: false
    default: './internal/...'

runs:
  using: "composite"
  steps:
    # ==========================================================
    # Phase 1: Unit Tests & Coverage
    # ==========================================================
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Go ${{ inputs.go_version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}
        cache: true

    - name: Run unit tests with coverage
      shell: bash
      run: |
        go test -race -coverprofile=coverage.out -covermode=atomic ${{ inputs.test_path }} -v
        go tool cover -func=coverage.out > coverage-summary.txt

    - name: Generate coverage report
      if: github.event_name == 'pull_request'
      id: coverage
      shell: bash
      run: |
        COVERAGE=$(grep total coverage-summary.txt | awk '{print $3}')

        echo "## Code Coverage Report" > coverage-output.txt
        echo "" >> coverage-output.txt
        echo "### Total Coverage: \`$COVERAGE\`" >> coverage-output.txt
        echo "" >> coverage-output.txt

        echo "| Package | Coverage |" >> coverage-output.txt
        echo "|---------|----------|" >> coverage-output.txt

        REPO_PATH="github.com/${{ github.repository }}/"
        grep -v "total:" coverage-summary.txt | grep "%" | while read -r line; do
          PACKAGE=$(echo "$line" | awk '{print $1}' | sed "s|${REPO_PATH}||")
          PERCENT=$(echo "$line" | awk '{print $3}')
          echo "| \`$PACKAGE\` | $PERCENT |" >> coverage-output.txt
        done

        echo "| **Total** | **$COVERAGE** |" >> coverage-output.txt
        echo "" >> coverage-output.txt

        echo '<details>' >> coverage-output.txt
        echo '<summary>View Raw Coverage Output</summary>' >> coverage-output.txt
        echo "" >> coverage-output.txt
        echo '```' >> coverage-output.txt
        cat coverage-summary.txt >> coverage-output.txt
        echo '```' >> coverage-output.txt
        echo '</details>' >> coverage-output.txt

        echo "HAS_COVERAGE=true" >> $GITHUB_OUTPUT

    - name: Comment PR with coverage
      if: github.event_name == 'pull_request' && steps.coverage.outputs.HAS_COVERAGE == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const coverageOutput = fs.readFileSync('coverage-output.txt', 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('## Code Coverage Report')
          );

          const commentBody = `${coverageOutput}\n\n---\n<sub>Generated by \`go tool cover\`</sub>`;

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: commentBody
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
          }

    # ==========================================================
    # Phase 2: Linting
    # ==========================================================
    - name: Run linter with reviewdog
      uses: reviewdog/action-golangci-lint@v2
      with:
        github_token: ${{ inputs.github_token }}
        golangci_lint_flags: "--timeout=${{ inputs.golangci_lint_timeout }}"
        reporter: github-pr-review
        fail_level: error
        filter_mode: added
        level: warning
        cache: false

    # ==========================================================
    # Phase 3: Docker Image Build (Buildx with GHA cache)
    # ==========================================================
    - name: Generate version info
      id: version
      shell: bash
      run: |
        if git describe --tags --exact-match 2>/dev/null; then
          VERSION=$(git describe --tags --exact-match)
        elif git describe --tags 2>/dev/null; then
          VERSION=$(git describe --tags --always --dirty)
        else
          BRANCH=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || echo "unknown")
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
          VERSION="${BRANCH}-${COMMIT}"
        fi

        COMMIT_HASH=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
        BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "commit=$COMMIT_HASH" >> $GITHUB_OUTPUT
        echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT

        echo "Version: $VERSION"
        echo "Commit: $COMMIT_HASH"
        echo "Build Time: $BUILD_TIME"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and export Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        tags: localhost/${{ inputs.docker_image_name }}:e2e-test
        build-args: |
          VERSION=${{ steps.version.outputs.version }}
          COMMIT_HASH=${{ steps.version.outputs.commit }}
          BUILD_TIME=${{ steps.version.outputs.build_time }}
        outputs: type=docker,dest=${{ runner.temp }}/${{ inputs.docker_image_name }}.tar
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # ==========================================================
    # Phase 4: Security Scan
    # ==========================================================
    - name: Run govulncheck
      uses: golang/govulncheck-action@v1
      with:
        go-version-input: ${{ inputs.go_version }}
        repo-checkout: false

    - name: Run TruffleHog secret scanning
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: origin/${{ github.event.repository.default_branch }}
        head: HEAD
        extra_args: --debug --only-verified

    - name: Run Trivy vulnerability scanner on Docker image
      uses: aquasecurity/trivy-action@0.35.0
      with:
        input: ${{ runner.temp }}/${{ inputs.docker_image_name }}.tar
        format: 'table'
        severity: 'CRITICAL,HIGH,MEDIUM'
        vuln-type: 'os,library'
        ignore-unfixed: true
        exit-code: '0'

    # ==========================================================
    # Phase 5: E2E Tests (skip for renovate bot)
    # ==========================================================
    - name: Load Docker image for E2E
      if: github.event.pull_request.user.login != 'renovate[bot]'
      shell: bash
      run: |
        E2E_DIR=$(echo "${{ inputs.e2e_test_path }}" | sed 's|/\.\.\.$||')
        if [ -d "$E2E_DIR" ]; then
          docker load --input ${{ runner.temp }}/${{ inputs.docker_image_name }}.tar
        else
          echo "E2E directory $E2E_DIR not found, skipping Docker image load"
        fi

    - name: Run E2E tests
      if: github.event.pull_request.user.login != 'renovate[bot]'
      shell: bash
      run: |
        E2E_DIR=$(echo "${{ inputs.e2e_test_path }}" | sed 's|/\.\.\.$||')
        if [ -d "$E2E_DIR" ]; then
          go test -v -timeout 30m ${{ inputs.e2e_test_path }}
        else
          echo "E2E directory $E2E_DIR not found, skipping E2E tests"
        fi
      env:
        E2E_SKIP_CLEANUP: ""

    # ==========================================================
    # Phase 6: Benchmarks (skip for renovate bot)
    # ==========================================================
    - name: Install benchstat
      if: github.event.pull_request.user.login != 'renovate[bot]'
      shell: bash
      run: |
        go install golang.org/x/perf/cmd/benchstat@latest

    - name: Run benchmarks (current branch)
      if: github.event.pull_request.user.login != 'renovate[bot]'
      shell: bash
      run: |
        go test -bench=. -benchmem -benchtime=5s ${{ inputs.benchmark_path }} | tee current-bench.txt

    - name: Run benchmarks (base branch) for comparison
      if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'renovate[bot]'
      shell: bash
      env:
        BASE_REF: ${{ github.base_ref }}
      run: |
        git fetch origin "$BASE_REF"
        git checkout "origin/$BASE_REF"
        go test -run=^$ -bench=. -benchmem -benchtime=5s ${{ inputs.benchmark_path }} | tee base-bench.txt
        git checkout -

    - name: Compare benchmarks with benchstat
      if: github.event_name == 'pull_request' && github.event.pull_request.user.login != 'renovate[bot]'
      id: benchstat
      shell: bash
      run: |
        if [ -f base-bench.txt ] && [ -f current-bench.txt ]; then
          echo "## Benchmark Comparison" > benchstat-output.txt
          echo "" >> benchstat-output.txt
          echo '```' >> benchstat-output.txt
          benchstat base-bench.txt current-bench.txt >> benchstat-output.txt || echo "No significant changes detected" >> benchstat-output.txt
          echo '```' >> benchstat-output.txt

          echo "HAS_COMPARISON=true" >> $GITHUB_OUTPUT
        else
          echo "HAS_COMPARISON=false" >> $GITHUB_OUTPUT
        fi

    - name: Comment PR with benchmark results
      if: github.event_name == 'pull_request' && steps.benchstat.outputs.HAS_COMPARISON == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github_token }}
        script: |
          const fs = require('fs');
          const benchstatOutput = fs.readFileSync('benchstat-output.txt', 'utf8');

          const { data: comments } = await github.rest.issues.listComments({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
          });

          const botComment = comments.find(comment =>
            comment.user.type === 'Bot' &&
            comment.body.includes('## Benchmark Comparison')
          );

          const commentBody = `${benchstatOutput}\n\n---\n<sub>Generated by [benchstat](https://pkg.go.dev/golang.org/x/perf/cmd/benchstat)</sub>`;

          if (botComment) {
            await github.rest.issues.updateComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: botComment.id,
              body: commentBody
            });
          } else {
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
          }
