name: 'Release Go CLI with GoReleaser'
description: 'Build multi-platform binaries and publish a GitHub Release using GoReleaser v2'
inputs:
  go_version:
    description: 'Go version to use'
    required: false
    default: '1.26.x'
  PLATFORM_ASSISTANT_GH_APP_ID:
    description: 'GitHub App ID for release token generation'
    required: true
  PLATFORM_ASSISTANT_GH_APP_PRIVATE_KEY:
    description: 'GitHub App private key for release token generation'
    required: true

runs:
  using: "composite"
  steps:
    - name: Generate GitHub App Token
      id: generate_token
      uses: actions/create-github-app-token@v1
      with:
        app-id: ${{ inputs.PLATFORM_ASSISTANT_GH_APP_ID }}
        private-key: ${{ inputs.PLATFORM_ASSISTANT_GH_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}

    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ steps.generate_token.outputs.token }}

    - name: Setup Go ${{ inputs.go_version }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ inputs.go_version }}
        cache: true

    - name: Run GoReleaser
      uses: goreleaser/goreleaser-action@v6
      with:
        distribution: goreleaser
        version: "~> v2"
        args: release --clean
      env:
        GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
