name: AWS Golang Public Service — Build & Push to ECR Public

on:
  workflow_call:
    inputs:
      docker_file_path:
        description: 'Docker file path'
        required: false
        type: string
        default: './Dockerfile'
      go_version:
        description: 'Go version to use'
        required: false
        type: string
        default: '1.26.x'
      ecr_repository_name:
        description: 'ECR repository name without public alias (e.g., kubeadapt/app/my-service)'
        type: string
        required: true
      image_tag:
        description: 'Custom image tag (optional, auto-generated if not provided)'
        type: string
        required: false
      platforms:
        description: 'Target platforms for multi-arch build'
        type: string
        required: false
        default: 'linux/amd64,linux/arm64'
      ecr_public_alias:
        description: 'ECR Public registry alias (prepended only for public ECR pushes)'
        type: string
        required: true
      aws_role_to_assume:
        description: 'The AWS role ARN to assume (from repo variable AWS_ROLE_TO_ASSUME)'
        type: string
        required: true
      binary_name:
        description: 'Binary name in image (used for GH Release asset filenames). Defaults to repo name.'
        type: string
        required: false
        default: ''
      binary_path_in_image:
        description: 'Absolute path to the binary inside the Docker image (defaults to /<repo-name>)'
        type: string
        required: false
        default: ''
    secrets:
      PLATFORM_ASSISTANT_GH_APP_ID:
        description: 'Github App ID'
        required: true
      PLATFORM_ASSISTANT_GH_APP_PRIVATE_KEY:
        description: 'Github App private key'
        required: true
      AWS_REGION:
        description: 'The AWS region'
        required: true
      AWS_ACCOUNT_ID:
        description: 'The AWS account ID'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build-and-push.outputs.image_tag }}
      image_uri: ${{ steps.build-and-push.outputs.image_uri }}
    steps:
      - name: Build and push Go application Docker image to ECR Public
        id: build-and-push
        uses: kubeadapt/public-actions/.github/actions/aws-golang-public-build-and-push@main
        with:
          docker_file_path: ${{ inputs.docker_file_path }}
          go_version: ${{ inputs.go_version }}
          ecr_repository_name: ${{ inputs.ecr_repository_name }}
          image_tag: ${{ inputs.image_tag }}
          platforms: ${{ inputs.platforms }}
          ecr_public_alias: ${{ inputs.ecr_public_alias }}
          PLATFORM_ASSISTANT_GH_APP_ID: ${{ secrets.PLATFORM_ASSISTANT_GH_APP_ID }}
          PLATFORM_ASSISTANT_GH_APP_PRIVATE_KEY: ${{ secrets.PLATFORM_ASSISTANT_GH_APP_PRIVATE_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
          AWS_ROLE_TO_ASSUME: ${{ inputs.aws_role_to_assume }}

  release:
    name: GitHub Release + SBOM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure AWS for ECR Public
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/${{ inputs.aws_role_to_assume }}
          aws-region: us-east-1

      - name: Login to Amazon ECR Public
        uses: aws-actions/amazon-ecr-login@v2
        with:
          registry-type: public

      - name: Extract binaries from multi-arch image
        shell: bash
        env:
          IMAGE: ${{ needs.build-and-push.outputs.image_uri }}
          BINARY_NAME_INPUT: ${{ inputs.binary_name }}
          BINARY_PATH_INPUT: ${{ inputs.binary_path_in_image }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: |
          BINARY_NAME="${BINARY_NAME_INPUT:-$REPO_NAME}"
          BINARY_PATH="${BINARY_PATH_INPUT:-/$REPO_NAME}"
          echo "binary_name=$BINARY_NAME, binary_path=$BINARY_PATH"
          mkdir -p release-assets
          for arch in amd64 arm64; do
            cid=$(docker create --platform linux/$arch "$IMAGE")
            docker cp "${cid}:${BINARY_PATH}" "release-assets/${BINARY_NAME}-linux-${arch}"
            docker rm "$cid"
          done
          ls -lh release-assets/

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-and-push.outputs.image_uri }}
          format: spdx-json
          output-file: release-assets/sbom.spdx.json
          upload-release-assets: false

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ needs.build-and-push.outputs.image_uri }}
          format: cyclonedx-json
          output-file: release-assets/sbom.cyclonedx.json
          upload-release-assets: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
          generate_release_notes: true
          files: |
            release-assets/*-linux-amd64
            release-assets/*-linux-arm64
            release-assets/sbom.spdx.json
            release-assets/sbom.cyclonedx.json
